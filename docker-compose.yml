version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: datn_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: datn
      MYSQL_USER: datn_user
      MYSQL_PASSWORD: datn_password
    ports:
      - "3306:3306"
    volumes:
      - datn_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: datn_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - MYSQL_ROOT_PASSWORD=root
    depends_on:
      - mysql

volumes:
  datn_mysql_data:
    driver: local